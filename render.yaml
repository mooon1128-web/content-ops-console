services:
  - type: web
    name: content-ops-console
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node content-ops/server.js --host 0.0.0.0
    healthCheckPath: /api/health
    disk:
      name: content-ops-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: CONTENT_OPS_DATA
        value: /var/data/content-ops-data.json
      - key: XHS_MEDIA_DATA
        value: /var/data/xhs-media-data.json
      - key: XHS_MEDIA_PASSWORD
        sync: false
      - key: XHS_MEDIA_AUTH_SECRET
        sync: false
